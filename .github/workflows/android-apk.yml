name: Build Android APK

# Compila automáticamente el APK de Senior Safe sin Android Studio.
# Se ejecuta en cada push a main o manualmente desde la pestaña Actions.
# El APK queda disponible como artifact descargable y, en pushes con tag v*,
# se publica como GitHub Release.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag opcional para crear un Release (ej: v1.0.3)'
        required: false

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Install Capacitor
        run: |
          bun add @capacitor/core @capacitor/cli @capacitor/android \
                  @capacitor/splash-screen @capacitor/local-notifications \
                  @capacitor/geolocation

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      # TanStack Start + Cloudflare construye un Worker SSR (no genera un
      # dist/index.html estático). Capacitor necesita SÍ o SÍ un dist/index.html,
      # así que generamos un shell estático que carga directamente la pantalla
      # /native publicada. El backend (Supabase / Twilio / Webpay / server fns)
      # sigue viviendo en Lovable Cloud, intacto.
      - name: Forzar dist/index.html con shell /native (fallback)
        run: |
          mkdir -p dist
          # SIEMPRE sobrescribimos. La APK usa server.url de capacitor.config.ts
          # para cargar /native directo, pero si alguna build fuera offline,
          # este shell garantiza que NUNCA se abra la landing web antigua.
          echo "⚠️  Escribiendo shell estático que fuerza /native..."
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
              <title>Senior Safe</title>
              <style>
                html,body{margin:0;height:100%;background:#0d4f5c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
                .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
                .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;}
                @keyframes spin{to{transform:rotate(360deg);}}
                .msg{font-size:15px;opacity:.95;max-width:300px;line-height:1.4;}
                .err{display:none;}
                .err button{margin-top:18px;background:#16a34a;color:#fff;border:0;border-radius:14px;padding:14px 22px;font-size:16px;font-weight:700;}
                .small{font-size:12px;opacity:.65;margin-top:10px;}
              </style>
            </head>
            <body>
              <div class="wrap" id="loading">
                <div class="spinner"></div>
                <div class="msg" id="status">Cargando Senior Safe…</div>
                <div class="small" id="origin"></div>
              </div>
              <div class="wrap err" id="error">
                <div class="msg">No se pudo conectar a Senior Safe.<br/>Revisa tu conexión a internet e inténtalo de nuevo.</div>
                <button onclick="location.reload()">Reintentar</button>
              </div>
              <script>
                // Orígenes en orden de preferencia. Probamos hasta encontrar uno
                // donde /native responda OK (publicado).
                var ORIGINS = [
                  "https://alarmaseniorsafe.cl",
                  "https://www.alarmaseniorsafe.cl",
                  "https://senior-life-guardian.lovable.app"
                ];
                var statusEl = document.getElementById("status");
                var originEl = document.getElementById("origin");
                async function probe(origin){
                  try{
                    var ctrl = new AbortController();
                    var to = setTimeout(function(){ctrl.abort();}, 5000);
                    var r = await fetch(origin + "/native", {method:"GET", redirect:"follow", signal: ctrl.signal});
                    clearTimeout(to);
                    return r.ok;
                  }catch(e){ return false; }
                }
                (async function(){
                  for (var i = 0; i < ORIGINS.length; i++){
                    var o = ORIGINS[i];
                    statusEl.textContent = "Conectando…";
                    originEl.textContent = o.replace("https://","");
                    if (await probe(o)){
                      window.location.replace(o + "/native?source=apk");
                      return;
                    }
                  }
                  document.getElementById("loading").style.display = "none";
                  document.getElementById("error").style.display = "flex";
                })();
              </script>
            </body>
          </html>
          HTML
          ls -la dist/ | head -20
          test -f dist/index.html || (echo "❌ dist/index.html no existe" && exit 1)

      - name: Add Android platform (si no existe)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi

      - name: Cap sync Android
        run: |
          bunx cap sync android
          test -f android/app/src/main/assets/capacitor.plugins.json && echo "✅ capacitor.plugins.json OK" || (echo "❌ capacitor.plugins.json no se generó" && exit 1)

      # Generación determinística de íconos Android desde resources/icon.png.
      # Reemplaza el approach previo con @capacitor/assets (frágil) por
      # ImageMagick directo: produce mipmap PNGs estándar en las 5 densidades
      # + ic_launcher_round.png + foreground adaptive + adaptive XML + color.
      # Corre DESPUÉS de `cap sync` para que Capacitor no sobreescriba nada.
      - name: Generar íconos Android (mipmap + adaptive)
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          RES=android/app/src/main/res
          SRC=resources/icon.png
          FG=resources/icon-foreground.png
          BG_COLOR='#dc2626'

          # Tamaños legacy launcher (ic_launcher / ic_launcher_round)
          declare -A LAUNCHER=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          # Tamaños adaptive foreground (ic_launcher_foreground) - 108dp safe zone
          declare -A FOREGROUND=( [mdpi]=108 [hdpi]=162 [xhdpi]=216 [xxhdpi]=324 [xxxhdpi]=432 )

          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            DIR="$RES/mipmap-$d"
            mkdir -p "$DIR"
            S=${LAUNCHER[$d]}
            F=${FOREGROUND[$d]}
            # Launcher cuadrado (compatible Android <8)
            convert "$SRC" -resize ${S}x${S} -strip -define png:color-type=6 \
              -background "$BG_COLOR" -alpha remove -alpha off \
              "$DIR/ic_launcher.png"
            # Launcher redondo (mismo bitmap, Android lo enmascara)
            convert "$SRC" -resize ${S}x${S} -strip -define png:color-type=6 \
              -background "$BG_COLOR" -alpha remove -alpha off \
              "$DIR/ic_launcher_round.png"
            # Adaptive foreground (Android 8+) — mantiene transparencia
            convert "$FG" -resize ${F}x${F} -strip -define png:color-type=6 \
              "$DIR/ic_launcher_foreground.png"
          done

          # colors.xml con ic_launcher_background
          mkdir -p "$RES/values"
          COLORS="$RES/values/colors.xml"
          if [ ! -f "$COLORS" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><resources></resources>' > "$COLORS"
          fi
          # Remueve cualquier entrada previa de ic_launcher_background y agrega la nueva
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/res/values/colors.xml")
          t = p.read_text()
          t = re.sub(r'\s*<color name="ic_launcher_background">[^<]*</color>', '', t)
          t = t.replace('</resources>', '    <color name="ic_launcher_background">#dc2626</color>\n</resources>')
          p.write_text(t)
          PY

          # Adaptive icon XML (Android 8+)
          ADAPT="$RES/mipmap-anydpi-v26"
          mkdir -p "$ADAPT"
          cat > "$ADAPT/ic_launcher.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML
          cp "$ADAPT/ic_launcher.xml" "$ADAPT/ic_launcher_round.xml"

          # Verificar AndroidManifest referencia @mipmap/ic_launcher
          grep -q '@mipmap/ic_launcher' android/app/src/main/AndroidManifest.xml \
            && echo "✅ Manifest referencia @mipmap/ic_launcher" \
            || (echo "❌ Manifest NO referencia @mipmap/ic_launcher" && exit 1)

          # Inspección rápida
          echo "--- Íconos generados ---"
          ls -la "$RES"/mipmap-*/ic_launcher*.png | head -20
          identify "$RES/mipmap-xxxhdpi/ic_launcher.png"

      - name: Limpiar Gradle / build cache previo
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew clean --no-daemon
          rm -rf app/build .gradle

      - name: Build APK (debug)
        working-directory: android
        run: |
          ./gradlew assembleDebug --no-daemon

      - name: Validar APK (aapt + zip integrity)
        run: |
          set -euo pipefail
          APK=android/app/build/outputs/apk/debug/app-debug.apk
          test -f "$APK" || (echo "❌ APK no generada" && exit 1)
          # Integridad ZIP
          unzip -t "$APK" > /dev/null && echo "✅ APK ZIP íntegro"
          # AAPT badging — falla si el manifest o recursos están corruptos
          BUILD_TOOLS=$(ls -d $ANDROID_HOME/build-tools/*/ | sort -V | tail -1)
          AAPT="${BUILD_TOOLS}aapt"
          "$AAPT" dump badging "$APK" | head -20
          # Verifica que el ícono esté referenciado
          "$AAPT" dump badging "$APK" | grep -E "application-icon|launchable-activity" \
            && echo "✅ Ícono referenciado en APK" \
            || (echo "❌ Ícono NO encontrado en APK" && exit 1)
          # Verifica firma (debug keystore)
          APKSIGNER="${BUILD_TOOLS}apksigner"
          "$APKSIGNER" verify --print-certs "$APK" \
            && echo "✅ APK firmada correctamente" \
            || (echo "❌ APK sin firma válida" && exit 1)

      - name: Rename APK (nombre fijo + versionado)
        run: |
          mkdir -p artifacts
          # Nombre FIJO requerido por el botón "Descargar App":
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SeniorSafe.apk
          # Copia versionada adicional para histórico:
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SeniorSafe-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeniorSafe-APK
          path: artifacts/*.apk
          retention-days: 90

      # Sube SIEMPRE la APK al bucket público `apk` de Lovable Cloud Storage,
      # reemplazando el objeto `SeniorSafe.apk` en cada build. El botón
      # "Descargar App" apunta a https://alarmaseniorsafe.cl/downloads/SeniorSafe.apk
      # (server route que redirige al objeto público del bucket).
      #
      # Requiere estos secrets en el repo GitHub:
      #   - SUPABASE_URL                 (ej: https://mjdjfjxehnfroqyfzkyk.supabase.co)
      #   - SUPABASE_SERVICE_ROLE_KEY    (service_role key — NO el anon key)
      # Subida BINARIA PURA al bucket público `apk`.
      #
      # Reglas duras (causa raíz del bug "Content-Type: dentro del body"):
      #   - NUNCA usar `curl -i` (mezcla headers con body)
      #   - NUNCA redirigir respuesta HTTP a un archivo que luego se suba
      #   - NUNCA usar `--data` (modifica saltos de línea) — solo `-T` (upload-file)
      #     que es streaming binario puro, idéntico byte-a-byte al archivo origen.
      #   - Respuesta del servidor va a stdout/archivo SEPARADO, jamás al APK.
      #
      # Requiere estos secrets en el repo GitHub:
      #   - SUPABASE_URL                 (ej: https://mjdjfjxehnfroqyfzkyk.supabase.co)
      #   - SUPABASE_SERVICE_ROLE_KEY    (service_role key — NO el anon key)
      - name: Upload APK to Lovable Cloud Storage (bucket apk) — binario puro
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail

          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "❌ Faltan secrets SUPABASE_URL o SUPABASE_SERVICE_ROLE_KEY en el repo."
            exit 1
          fi

          APK_LOCAL=artifacts/SeniorSafe.apk
          test -f "$APK_LOCAL" || (echo "❌ No existe $APK_LOCAL" && exit 1)

          # PRE-CHECK 1: el archivo local DEBE empezar con PK\x03\x04
          LOCAL_MAGIC=$(head -c 4 "$APK_LOCAL" | od -An -tx1 | tr -d ' \n')
          LOCAL_SIZE=$(stat -c%s "$APK_LOCAL")
          echo "Local: size=$LOCAL_SIZE magic=$LOCAL_MAGIC"
          if [ "$LOCAL_MAGIC" != "504b0304" ]; then
            echo "❌ El APK LOCAL no empieza con PK\\x03\\x04 (magic=$LOCAL_MAGIC). Abortado antes de subir."
            exit 1
          fi

          URL="${SUPABASE_URL%/}/storage/v1/object/apk/SeniorSafe.apk"
          echo "⬆️  PUT $URL  ($LOCAL_SIZE bytes, binary streaming)"

          # `-T file` => upload-file: streaming binario puro, sin transformaciones.
          # `-o /tmp/upload.out`: respuesta del servidor a archivo APARTE (nunca toca el APK).
          # `-D /tmp/upload.headers`: headers de respuesta SEPARADOS (jamás se mezclan con body).
          # `-X PUT` + `x-upsert: true`: sobreescribe el objeto existente.
          set +e
          HTTP_CODE=$(curl -sS \
            -o /tmp/upload.out \
            -D /tmp/upload.headers \
            -w "%{http_code}" \
            -X PUT "$URL" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "Cache-Control: no-cache, max-age=0" \
            -H "x-upsert: true" \
            -T "$APK_LOCAL")
          CURL_RC=$?
          set -e

          echo "--- curl exit: $CURL_RC  http: $HTTP_CODE ---"
          echo "--- response headers ---"; cat /tmp/upload.headers || true
          echo "--- response body ---";    cat /tmp/upload.out     || true
          echo "------------------------"

          if [ "$CURL_RC" -ne 0 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Falló la subida al bucket apk (curl=$CURL_RC http=$HTTP_CODE)"
            exit 1
          fi

      # POST-CHECK: descargar el objeto público COMPLETO y comparar byte-a-byte
      # contra el APK local. Detecta:
      #   - headers HTTP escritos dentro del body (bug histórico)
      #   - truncamiento
      #   - cualquier byte basura prependido/append
      - name: Verificar integridad del APK publicado (descarga completa + diff)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          set -euo pipefail
          PUBLIC_URL="${SUPABASE_URL%/}/storage/v1/object/public/apk/SeniorSafe.apk"
          LOCAL=artifacts/SeniorSafe.apk
          REMOTE=/tmp/SeniorSafe.remote.apk
          LOCAL_SIZE=$(stat -c%s "$LOCAL")
          echo "Local size: $LOCAL_SIZE"

          # Pequeño retry porque la CDN puede tardar 1-2s en propagar.
          OK=0
          for i in 1 2 3 4 5 6; do
            rm -f "$REMOTE"
            # GET completo, body PURO a archivo (sin -i, sin -D mezclado).
            HTTP_CODE=$(curl -sS -L -o "$REMOTE" -w "%{http_code}" "$PUBLIC_URL?ts=$(date +%s%N)")
            REMOTE_SIZE=$(stat -c%s "$REMOTE" 2>/dev/null || echo 0)
            echo "try $i: http=$HTTP_CODE  remote_size=$REMOTE_SIZE"
            if [ "$HTTP_CODE" = "200" ] && [ "$REMOTE_SIZE" = "$LOCAL_SIZE" ]; then
              OK=1; break
            fi
            sleep 3
          done

          if [ "$OK" -ne 1 ]; then
            echo "❌ Tamaño remoto ≠ local tras varios intentos. Objeto corrupto en el bucket."
            head -c 200 "$REMOTE" | od -c | head -10 || true
            exit 1
          fi

          REMOTE_MAGIC=$(head -c 4 "$REMOTE" | od -An -tx1 | tr -d ' \n')
          echo "Remote magic: $REMOTE_MAGIC (esperado: 504b0304)"
          if [ "$REMOTE_MAGIC" != "504b0304" ]; then
            echo "❌ APK remota NO empieza con PK\\x03\\x04. Android la rechazará."
            echo "   Primeros bytes recibidos:"
            head -c 200 "$REMOTE" | od -c | head -10
            exit 1
          fi

          # Diff binario exacto: cero tolerancia a diferencias.
          if ! cmp -s "$LOCAL" "$REMOTE"; then
            echo "❌ El APK publicado NO coincide byte-a-byte con el local."
            cmp "$LOCAL" "$REMOTE" || true
            exit 1
          fi

          # Verificación funcional adicional: integridad ZIP del archivo descargado.
          unzip -t "$REMOTE" > /dev/null && echo "✅ ZIP remoto íntegro"

          echo "✅ APK publicada idéntica al local ($LOCAL_SIZE bytes, magic OK, cmp OK)."
