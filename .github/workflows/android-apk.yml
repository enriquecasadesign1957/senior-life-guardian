name: Build Android APK

# Compila automáticamente el APK de Senior Safe sin Android Studio.
# Se ejecuta en cada push a main o manualmente desde la pestaña Actions.
# El APK queda disponible como artifact descargable y, en pushes con tag v*,
# se publica como GitHub Release.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag opcional para crear un Release (ej: v1.0.3)'
        required: false

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Install Capacitor
        run: |
          bun add @capacitor/core @capacitor/cli @capacitor/android \
                  @capacitor/splash-screen @capacitor/local-notifications \
                  @capacitor/geolocation

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      # TanStack Start + Cloudflare construye un Worker SSR (no genera un
      # dist/index.html estático). Capacitor necesita SÍ o SÍ un dist/index.html,
      # así que generamos un shell estático que carga directamente la pantalla
      # /native publicada. El backend (Supabase / Twilio / Webpay / server fns)
      # sigue viviendo en Lovable Cloud, intacto.
      - name: Forzar dist/index.html con shell /native (fallback)
        run: |
          mkdir -p dist
          echo "⚠️  Escribiendo shell estático que fuerza /native..."
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
              <title>Senior Safe</title>
              <style>
                html,body{margin:0;height:100%;background:#0d4f5c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
                .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
                .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;}
                @keyframes spin{to{transform:rotate(360deg);}}
                .msg{font-size:15px;opacity:.95;max-width:300px;line-height:1.4;}
                .err{display:none;}
                .err button{margin-top:18px;background:#16a34a;color:#fff;border:0;border-radius:14px;padding:14px 22px;font-size:16px;font-weight:700;}
                .small{font-size:12px;opacity:.65;margin-top:10px;}
              </style>
            </head>
            <body>
              <div class="wrap" id="loading">
                <div class="spinner"></div>
                <div class="msg" id="status">Cargando Senior Safe…</div>
                <div class="small" id="origin"></div>
              </div>
              <div class="wrap err" id="error">
                <div class="msg">No se pudo conectar a Senior Safe.<br/>Revisa tu conexión a internet e inténtalo de nuevo.</div>
                <button onclick="location.reload()">Reintentar</button>
              </div>
              <script>
                var ORIGINS = [
                  "https://alarmaseniorsafe.cl",
                  "https://www.alarmaseniorsafe.cl",
                  "https://senior-life-guardian.lovable.app"
                ];
                var statusEl = document.getElementById("status");
                var originEl = document.getElementById("origin");
                async function probe(origin){
                  try{
                    var ctrl = new AbortController();
                    var to = setTimeout(function(){ctrl.abort();}, 5000);
                    var r = await fetch(origin + "/native", {method:"GET", redirect:"follow", signal: ctrl.signal});
                    clearTimeout(to);
                    return r.ok;
                  }catch(e){ return false; }
                }
                (async function(){
                  for (var i = 0; i < ORIGINS.length; i++){
                    var o = ORIGINS[i];
                    statusEl.textContent = "Conectando…";
                    originEl.textContent = o.replace("https://","");
                    if (await probe(o)){
                      window.location.replace(o + "/native?source=apk");
                      return;
                    }
                  }
                  document.getElementById("loading").style.display = "none";
                  document.getElementById("error").style.display = "flex";
                })();
              </script>
            </body>
          </html>
          HTML
          ls -la dist/ | head -20
          test -f dist/index.html || (echo "❌ dist/index.html no existe" && exit 1)

      - name: Add Android platform (si no existe)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi
          bunx cap sync android
          test -f android/app/src/main/assets/capacitor.plugins.json && echo "✅ capacitor.plugins.json OK" || (echo "❌ capacitor.plugins.json no se generó" && exit 1)

      # Íconos rojos (#dc2626) — generación determinística con ImageMagick.
      - name: Generar íconos Android (mipmap + adaptive)
        run: |
          set -euo pipefail
          sudo apt-get update -qq && sudo apt-get install -y -qq imagemagick
          RES=android/app/src/main/res
          SRC=resources/icon.png
          FG=resources/icon-foreground.png
          BG_COLOR='#dc2626'

          declare -A LAUNCHER=( [mdpi]=48 [hdpi]=72 [xhdpi]=96 [xxhdpi]=144 [xxxhdpi]=192 )
          declare -A FOREGROUND=( [mdpi]=108 [hdpi]=162 [xhdpi]=216 [xxhdpi]=324 [xxxhdpi]=432 )

          for d in mdpi hdpi xhdpi xxhdpi xxxhdpi; do
            DIR="$RES/mipmap-$d"
            mkdir -p "$DIR"
            S=${LAUNCHER[$d]}
            F=${FOREGROUND[$d]}
            convert "$SRC" -resize ${S}x${S} -strip -define png:color-type=6 \
              -background "$BG_COLOR" -alpha remove -alpha off \
              "$DIR/ic_launcher.png"
            convert "$SRC" -resize ${S}x${S} -strip -define png:color-type=6 \
              -background "$BG_COLOR" -alpha remove -alpha off \
              "$DIR/ic_launcher_round.png"
            convert "$FG" -resize ${F}x${F} -strip -define png:color-type=6 \
              "$DIR/ic_launcher_foreground.png"
          done

          # Evitar duplicado de ic_launcher_background (queda solo en colors.xml)
          find "$RES" -type f -name 'ic_launcher_background.xml' -print -delete || true

          mkdir -p "$RES/values"
          COLORS="$RES/values/colors.xml"
          if [ ! -f "$COLORS" ]; then
            echo '<?xml version="1.0" encoding="utf-8"?><resources></resources>' > "$COLORS"
          fi
          python3 - <<'PY'
          import re, pathlib
          p = pathlib.Path("android/app/src/main/res/values/colors.xml")
          t = p.read_text()
          t = re.sub(r'\s*<color name="ic_launcher_background">[^<]*</color>', '', t)
          t = t.replace('</resources>', '    <color name="ic_launcher_background">#dc2626</color>\n</resources>')
          p.write_text(t)
          PY

          ADAPT="$RES/mipmap-anydpi-v26"
          mkdir -p "$ADAPT"
          cat > "$ADAPT/ic_launcher.xml" <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          XML
          cp "$ADAPT/ic_launcher.xml" "$ADAPT/ic_launcher_round.xml"

      - name: Build APK (debug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK (nombre fijo + versionado)
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SeniorSafe.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SeniorSafe-${{ github.run_number }}.apk

      # Validación mínima PK\x03\x04 del APK local antes de publicar.
      - name: Validar magic PK del APK local
        run: |
          set -euo pipefail
          APK=artifacts/SeniorSafe.apk
          MAGIC=$(head -c 4 "$APK" | od -An -tx1 | tr -d ' \n')
          echo "Local magic: $MAGIC (esperado 504b0304)"
          test "$MAGIC" = "504b0304" || (echo "❌ APK local no empieza con PK\\x03\\x04" && exit 1)
          unzip -t "$APK" > /dev/null && echo "✅ ZIP local íntegro"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeniorSafe-APK
          path: artifacts/*.apk
          retention-days: 90

      # Upload baseline conocido (commit b24740c) — POST + --data-binary.
      # NO modificar este step salvo bug confirmado.
      - name: Upload APK to Lovable Cloud Storage (bucket apk)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "❌ Faltan secrets SUPABASE_URL o SUPABASE_SERVICE_ROLE_KEY en el repo."
            exit 1
          fi
          URL="${SUPABASE_URL%/}/storage/v1/object/apk/SeniorSafe.apk"
          echo "⬆️  Subiendo APK a $URL (PUT + upsert)"
          set +e
          HTTP_CODE=$(curl -sS -o /tmp/upload.out -w "%{http_code}" \
            -X PUT "$URL?upsert=true" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "x-upsert: true" \
            -H "Content-Type: application/vnd.android.package-archive" \
            -H "Cache-Control: no-cache, max-age=0" \
            --data-binary @artifacts/SeniorSafe.apk)
          CURL_EXIT=$?
          set -e
          echo "PUT exit=$CURL_EXIT http=$HTTP_CODE"
          UPLOAD_BODY=$(cat /tmp/upload.out 2>/dev/null || true)
          if [ "$HTTP_CODE" = "409" ] || echo "$UPLOAD_BODY" | grep -q '"statusCode":"409"\|"error":"Duplicate"\|resource already exists'; then
            echo "↻ Duplicate detectado (http=$HTTP_CODE): borrando objeto existente vía /storage/v1/object/remove y reintentando con POST..."
            DEL_CODE=$(curl -sS -o /tmp/delete.out -w "%{http_code}" \
              -X POST "${SUPABASE_URL%/}/storage/v1/object/remove" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/json" \
              -d '{"bucketId":"apk","prefixes":["SeniorSafe.apk"]}' || true)
            echo "DELETE (remove) http=$DEL_CODE"
            cat /tmp/delete.out || true
            echo ""
            sleep 2
            set +e
            HTTP_CODE=$(curl -sS -o /tmp/upload.out -w "%{http_code}" \
              -X POST "$URL" \
              -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
              -H "Content-Type: application/vnd.android.package-archive" \
              -H "Cache-Control: no-cache, max-age=0" \
              --data-binary @artifacts/SeniorSafe.apk)
            CURL_EXIT=$?
            set -e
            echo "POST fallback exit=$CURL_EXIT http=$HTTP_CODE"
          fi
          echo "HTTP $HTTP_CODE"
          cat /tmp/upload.out || true
          if [ "$HTTP_CODE" -ge 300 ]; then
            echo "❌ Falló la subida al bucket apk"
            exit 1
          fi
          echo "✅ APK publicada en: ${SUPABASE_URL%/}/storage/v1/object/public/apk/SeniorSafe.apk"

      # Verificación mínima: descargar publicado y comparar byte-a-byte contra local.
      - name: Verificar APK publicado (cmp byte-a-byte)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        run: |
          set -euo pipefail
          PUBLIC_URL="${SUPABASE_URL%/}/storage/v1/object/public/apk/SeniorSafe.apk"
          LOCAL=artifacts/SeniorSafe.apk
          REMOTE=/tmp/SeniorSafe.remote.apk
          LOCAL_SIZE=$(stat -c%s "$LOCAL")

          OK=0
          for i in 1 2 3 4 5; do
            rm -f "$REMOTE"
            HTTP_CODE=$(curl -sS -L -o "$REMOTE" -w "%{http_code}" "$PUBLIC_URL?ts=$(date +%s%N)")
            REMOTE_SIZE=$(stat -c%s "$REMOTE" 2>/dev/null || echo 0)
            echo "try $i: http=$HTTP_CODE  remote=$REMOTE_SIZE  local=$LOCAL_SIZE"
            if [ "$HTTP_CODE" = "200" ] && [ "$REMOTE_SIZE" = "$LOCAL_SIZE" ]; then
              OK=1; break
            fi
            sleep 3
          done
          [ "$OK" = "1" ] || (echo "❌ Tamaño remoto ≠ local" && exit 1)

          REMOTE_MAGIC=$(head -c 4 "$REMOTE" | od -An -tx1 | tr -d ' \n')
          echo "Remote magic: $REMOTE_MAGIC"
          test "$REMOTE_MAGIC" = "504b0304" || (echo "❌ Remote no empieza con PK\\x03\\x04" && exit 1)

          cmp -s "$LOCAL" "$REMOTE" || (echo "❌ cmp falló: remoto ≠ local" && exit 1)
          echo "✅ APK remoto idéntico al local ($LOCAL_SIZE bytes)."
