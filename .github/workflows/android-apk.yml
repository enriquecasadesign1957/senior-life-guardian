name: Build Android APK

# Compila automáticamente el APK de Senior Safe sin Android Studio.
# Se ejecuta en cada push a main o manualmente desde la pestaña Actions.
# El APK queda disponible como artifact descargable y se publica automáticamente
# como una GitHub Release para su descarga directa.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag opcional para crear un Release (ej: v1.0.3)'
        required: false

permissions:
  contents: write

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Install Capacitor
        run: |
          bun add @capacitor/core @capacitor/cli @capacitor/android \
                  @capacitor/splash-screen @capacitor/local-notifications \
                  @capacitor/geolocation

      - name: Build web bundle (Modo Estático Nativo)
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: |
          bun run build
          
          # Si TanStack no generó el index.html en dist por su lógica SSR, 
          # creamos un cascarón local seguro que no viaja por internet.
          if [ ! -f "dist/index.html" ]; then
            mkdir -p dist
            echo "<!doctype html><html><head><meta charset='utf-8'/><title>Senior Safe</title><script>window.location.href='/native?source=apk';</script></head><body></body></html>" > dist/index.html
          fi

      - name: Add Android platform (si no existe)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi
          bunx cap sync android
          test -f android/app/src/main/assets/capacitor.plugins.json && echo "✅ capacitor.plugins.json OK" || (echo "❌ capacitor.plugins.json no se generó" && exit 1)

      - name: Build APK (debug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK (nombre fijo + versionado)
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SeniorSafe.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeniorSafe-APK
          path: artifacts/SeniorSafe.apk
          retention-days: 90

      - name: Crear GitHub Release y Publicar APK
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || format('v1.0.{0}', github.run_number) }}
          name: ${{ github.event.inputs.release_tag || format('Versión 1.0.{0}', github.run_number) }}
          draft: false
          prerelease: false
          files: artifacts/SeniorSafe.apk
 
