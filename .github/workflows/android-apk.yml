name: Build Android APK

# Compila el APK de Senior Safe en cada push a main.
# Publica en GitHub Releases (latest), Supabase Storage y Actions artifacts.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_DIR: senior-life-guardian-main

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-35 build-tools;35.0.0 platform-tools

      - name: Install dependencies
        run: bun install

      - name: Generate app icons (PWA + Android)
        run: node scripts/generate-app-icons.mjs

      - name: Install Capacitor
        run: |
          bun add @capacitor/core @capacitor/cli @capacitor/android \
                  @capacitor/splash-screen @capacitor/local-notifications \
                  @capacitor/geolocation @capacitor/device

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      - name: Add Android platform (si no existe)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi
          bunx @capacitor/assets generate --assetPath resources --iconBackgroundColor '#dc2626' --iconBackgroundColorDark '#dc2626' --splashBackgroundColor '#dc2626' --splashBackgroundColorDark '#dc2626'
          bunx cap sync android
          test -f android/app/src/main/assets/capacitor.plugins.json

      - name: Inyectar Permisos Nativos de GPS en AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-feature android:name="android.hardware.location.gps" android:required="true" />' $MANIFEST
          fi

      - name: Build APK (debug)
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK (nombre fijo + versionado)
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SeniorSafe.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SeniorSafe-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeniorSafe-APK
          path: ${{ env.APP_DIR }}/artifacts/*.apk
          retention-days: 90

      - name: Publish GitHub Release (latest download)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Senior Safe APK #${{ github.run_number }}
          body: |
            APK automático de Senior Safe (icono y build actualizados).
            Commit: ${{ github.sha }}
          files: ${{ env.APP_DIR }}/artifacts/SeniorSafe.apk
          make_latest: true

      - name: Upload APK to Supabase Storage (bucket apk)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️ Faltan secrets SUPABASE — se omite subida a Storage."
            exit 0
          fi
          URL="${SUPABASE_URL%/}/storage/v1/object/apk/SeniorSafe.apk"
          curl -sS -o /tmp/delete.out -w "HTTP %{http_code}\n" \
            -X DELETE "$URL" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" || true
          curl -sS -X POST "$URL" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@artifacts/SeniorSafe.apk"
