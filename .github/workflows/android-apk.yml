name: Build Android APK

# Compila automáticamente el APK de Senior Safe sin Android Studio.
# Se ejecuta en cada push a main o manualmente desde la pestaña Actions.
# El APK queda disponible como artifact descargable y, en pushes con tag v*,
# se publica como GitHub Release.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Tag opcional para crear un Release (ej: v1.0.3)'
        required: false

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: bun install

      - name: Install Capacitor
        run: |
          bun add @capacitor/core @capacitor/cli @capacitor/android \
                  @capacitor/splash-screen @capacitor/local-notifications \
                  @capacitor/geolocation

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build

      # TanStack Start + Cloudflare construye un Worker SSR (no genera un
      # dist/index.html estático). Capacitor necesita SÍ o SÍ un dist/index.html,
      # así que generamos un shell estático que carga directamente la pantalla
      # /native publicada. El backend (Supabase / Twilio / Webpay / server fns)
      # sigue viviendo en Lovable Cloud, intacto.
      - name: Garantizar dist/index.html para Capacitor
        run: |
          mkdir -p dist
          if [ ! -f "dist/index.html" ]; then
            echo "⚠️  No se generó dist/index.html en el build SSR. Creando shell estático para /native..."
            cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
              <title>Senior Safe</title>
              <style>
                html,body{margin:0;height:100%;background:#0d4f5c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
                .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
                .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;}
                @keyframes spin{to{transform:rotate(360deg);}}
              </style>
            </head>
            <body>
              <div class="wrap">
                <div class="spinner"></div>
                <div>Cargando Senior Safe…</div>
              </div>
              <script>
                window.location.replace("https://alarmaseniorsafe.cl/native");
              </script>
            </body>
          </html>
          HTML
          fi
          ls -la dist/ | head -20
          test -f dist/index.html || (echo "❌ dist/index.html no existe" && exit 1)

      - name: Add Android platform (si no existe)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi
          # cap sync requiere dist/index.html + node_modules con plugins.
          # Lo corremos después de instalar capacitor.* y de garantizar dist/.
          bunx cap sync android
          # Verifica que el archivo problemático exista tras el sync.
          test -f android/app/src/main/assets/capacitor.plugins.json && echo "✅ capacitor.plugins.json OK" || (echo "❌ capacitor.plugins.json no se generó" && exit 1)

      - name: Build APK (debug)
        working-directory: android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SeniorSafe-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeniorSafe-APK
          path: artifacts/*.apk
          retention-days: 90

      - name: Publish Release (solo en tags)
        if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.release_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.release_tag || github.ref_name }}
          name: Senior Safe ${{ github.event.inputs.release_tag || github.ref_name }}
          files: artifacts/*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
