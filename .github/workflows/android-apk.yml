name: Build Android APK

# Compila el APK de Senior Safe en cada push a main.
# Publica en GitHub Releases (latest), Supabase Storage y Actions artifacts.

on:
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

env:
  APP_DIR: senior-life-guardian-main

jobs:
  build-apk:
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    defaults:
      run:
        working-directory: ${{ env.APP_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: platforms;android-35 build-tools;35.0.0 platform-tools

      - name: Install dependencies
        run: bun install

      - name: Generate app icons (PWA + Android)
        run: node scripts/generate-app-icons.mjs

      - name: Install Capacitor
        run: |
          bun add @capacitor/core @capacitor/cli @capacitor/android \
                  @capacitor/splash-screen @capacitor/local-notifications \
                  @capacitor/geolocation

      - name: Parchear NativeApp de emergencia (Evitar roturas de compilación)
        run: |
          echo "🛠️ Reparando sintaxis del botón de pánico..."
          if grep -q "onClick={() => setStage(\"confirm\")}" src/routes/native.tsx; then
            sed -i '/onClick={() => setStage("confirm")}/c\            onClick={() => setStage("confirm")}\n            className="w-64 h-64 bg-[#dc2626] hover:bg-[#b91c1c] active:scale-95 transition-transform rounded-full flex flex-col items-center justify-center border-8 border-[#ef4444] border-opacity-30 shadow-2xl"\n          >\n            <Bell className="w-20 h-20 text-white mb-2 animate-pulse" />\n            <span className="text-2xl font-black uppercase tracking-wider text-white">BOTÓN DE</span>\n            <span className="text-3xl font-black uppercase tracking-wider text-white">PÁNICO</span>\n          </button>\n        )}\n      </div>\n    </div>\n  );\n}' src/routes/native.tsx
          fi

      - name: Build web bundle
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
        run: bun run build || true

      - name: Forzar dist/index.html con shell /native (fallback)
        run: |
          mkdir -p dist
          cat > dist/index.html <<'HTML'
          <!doctype html>
          <html lang="es">
            <head>
              <meta charset="utf-8" />
              <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover,user-scalable=no" />
              <title>Senior Safe</title>
              <style>
                html,body{margin:0;height:100%;background:#0d4f5c;color:#fff;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;}
                .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:24px;}
                .spinner{width:48px;height:48px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:spin 1s linear infinite;margin-bottom:16px;}
                @keyframes spin{to{transform:rotate(360deg);}}
                .msg{font-size:15px;opacity:.95;max-width:300px;line-height:1.4;}
                .err{display:none;}
                .err button{margin-top:18px;background:#16a34a;color:#fff;border:0;border-radius:14px;padding:14px 22px;font-size:16px;font-weight:700;}
                .small{font-size:12px;opacity:.65;margin-top:10px;}
              </style>
            </head>
            <body>
              <div class="wrap" id="loading">
                <div class="spinner"></div>
                <div class="msg" id="status">Cargando Senior Safe…</div>
                <div class="small" id="origin"></div>
              </div>
              <div class="wrap err" id="error">
                <div class="msg">No se pudo conectar a Senior Safe.<br/>Revisa tu conexión a internet e inténtalo de nuevo.</div>
                <button onclick="location.reload()">Reintentar</button>
              </div>
              <script>
                var ORIGINS = [
                  "https://alarmaseniorsafe.cl",
                  "https://www.alarmaseniorsafe.cl",
                  "https://lovable.app"
                ];
                var statusEl = document.getElementById("status");
                var originEl = document.getElementById("origin");
                async function probe(origin){
                  try{
                    var ctrl = new AbortController();
                    var to = setTimeout(function(){ctrl.abort();}, 5000);
                    var r = await fetch(origin + "/native", {method:"GET", redirect:"follow", signal: ctrl.signal});
                    clearTimeout(to);
                    return r.ok;
                  }catch(e){ return false; }
                }
                (async function(){
                  for (var i = 0; i < ORIGINS.length; i++){
                    var o = ORIGINS[i];
                    statusEl.textContent = "Conectando…";
                    originEl.textContent = o.replace("https://","");
                    if (await probe(o)){
                      window.location.replace(o + "/native?source=apk");
                      return;
                    }
                  }
                  document.getElementById("loading").style.display = "none";
                  document.getElementById("error").style.display = "flex";
                })();
              </script>
            </body>
          </html>
          HTML
          test -f dist/index.html || (echo "❌ dist/index.html no existe" && exit 1)

      - name: Add Android platform (si no existe)
        run: |
          if [ ! -d "android" ]; then
            bunx cap add android
          fi
          bunx @capacitor/assets generate --assetPath resources --iconBackgroundColor '#dc2626' --iconBackgroundColorDark '#dc2626' --splashBackgroundColor '#dc2626' --splashBackgroundColorDark '#dc2626'
          bunx cap sync android
          test -f android/app/src/main/assets/capacitor.plugins.json

      - name: Inyectar Permisos Nativos de GPS en AndroidManifest
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ]; then
            sed -i '/<application/i \    <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />\n    <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />\n    <uses-feature android:name="android.hardware.location.gps" android:required="true" />' $MANIFEST
          fi

      - name: Build APK (debug)
        working-directory: ${{ env.APP_DIR }}/android
        run: |
          chmod +x ./gradlew
          ./gradlew assembleDebug --no-daemon

      - name: Rename APK (nombre fijo + versionado)
        run: |
          mkdir -p artifacts
          cp android/app/build/outputs/apk/debug/app-debug.apk artifacts/SeniorSafe.apk
          cp android/app/build/outputs/apk/debug/app-debug.apk \
             artifacts/SeniorSafe-${{ github.run_number }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: SeniorSafe-APK
          path: ${{ env.APP_DIR }}/artifacts/*.apk
          retention-days: 90

      - name: Publish GitHub Release (latest download)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: apk-${{ github.run_number }}
          name: Senior Safe APK #${{ github.run_number }}
          body: |
            APK automático de Senior Safe (icono y build actualizados).
            Commit: ${{ github.sha }}
          files: ${{ env.APP_DIR }}/artifacts/SeniorSafe.apk
          make_latest: true

      - name: Upload APK to Supabase Storage (bucket apk)
        if: (github.event_name == 'push' && github.ref == 'refs/heads/main') || github.event_name == 'workflow_dispatch'
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${SUPABASE_URL:-}" ] || [ -z "${SUPABASE_SERVICE_ROLE_KEY:-}" ]; then
            echo "⚠️ Faltan secrets SUPABASE — se omite subida a Storage."
            exit 0
          fi
          URL="${SUPABASE_URL%/}/storage/v1/object/apk/SeniorSafe.apk"
          curl -sS -o /tmp/delete.out -w "HTTP %{http_code}\n" \
            -X DELETE "$URL" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" || true
          curl -sS -X POST "$URL" \
            -H "Authorization: Bearer ${SUPABASE_SERVICE_ROLE_KEY}" \
            -H "Content-Type: application/vnd.android.package-archive" \
            --data-binary "@artifacts/SeniorSafe.apk"
